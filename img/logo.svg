<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background -->
  <rect width="120" height="120" rx="22" fill="#1e3a5f"/>

  <!-- Sound waves (arcs emanating upward from liner) -->
  <path d="M30 68 Q60 22 90 68" stroke="#93c5fd" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M38 68 Q60 32 82 68" stroke="#60a5fa" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.65"/>
  <path d="M46 68 Q60 42 74 68" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M54 68 Q60 53 66 68" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Liner body (horizontal bar) -->
  <rect x="22" y="70" width="76" height="14" rx="3" fill="#2563eb" opacity="0.9"/>

  <!-- Liner cells (Helmholtz resonator cavities) -->
  <rect x="27" y="70" width="9" height="10" rx="1.5" fill="#1e3a5f"/>
  <rect x="40" y="70" width="9" height="10" rx="1.5" fill="#1e3a5f"/>
  <rect x="53" y="70" width="9" height="10" rx="1.5" fill="#1e3a5f"/>
  <rect x="66" y="70" width="9" height="10" rx="1.5" fill="#1e3a5f"/>
  <rect x="79" y="70" width="9" height="10" rx="1.5" fill="#1e3a5f"/>

  <!-- Cell neck slits (orifices) -->
  <line x1="31.5" y1="70" x2="31.5" y2="67" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="44.5" y1="70" x2="44.5" y2="67" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="57.5" y1="70" x2="57.5" y2="67" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="70.5" y1="70" x2="70.5" y2="67" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="83.5" y1="70" x2="83.5" y2="67" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Flow arrow (grazing flow over liner) -->
  <line x1="22" y1="86" x2="90" y2="86" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <polyline points="85,83 90,86 85,89" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.35"/>
</svg>
